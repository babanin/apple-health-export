name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting (workspace)
        run: cargo fmt --all -- --check

      - name: Run clippy (launcher)
        run: cargo clippy --all-targets -p apple-health-export -- -D warnings

      - name: Run clippy (gateway)
        run: cargo clippy --all-targets -p apple-health-export-gateway -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2

      - name: Run tests (gateway)
        run: cargo test --lib -p apple-health-export-gateway

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2

      - name: Build launcher
        run: cargo build --release -p apple-health-export

      - name: Build gateway
        run: cargo build --release -p apple-health-export-gateway
